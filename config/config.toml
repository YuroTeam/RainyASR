[audio]
sample_rate = 16000
channels = 1
frame_ms = 100
audio_queue_max_frames = 100

[asr]
asr_model = "qwen3-asr-flash-realtime"
asr_format = "pcm"
asr_language = "auto"

[subtitle]
font_family = "PingFang SC, Microsoft YaHei, sans-serif"
font_size = 24
text_color = "#FFFFFF"
bg_opacity = 80
bilingual_mode = true

[hotkey]
toggle_hotkey = "ctrl+shift+r"

[language]
target_lang = "zh"
